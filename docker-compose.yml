services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet_telemetry
    ports:
      - "5432:5432"
    volumes:
      - fleet_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_telemetry"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  fleet_pg_data:
